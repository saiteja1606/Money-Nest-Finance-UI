<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/src/assets/Favicons/House and nest with Rupee symbol.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/src/assets/Favicons/House and nest with Rupee symbol.png" />
  <link rel="apple-touch-icon" href="/src/assets/Favicons/House and nest with Rupee symbol.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Nest | Premium Finance Dashboard</title>
  <script>
    (function () {
      const isDark = localStorage.getItem('money-nest-dark-mode') === 'true';
      if (isDark) document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    /* Base background to prevent white flash, updated dynamically by AppContext */
    html, body { 
      margin: 0; padding: 0;
      width: 100%; height: 100%;
    }
    html:not(.dark) body { background-color: #f1f5f9; }
    html.dark body { background-color: #020617; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
